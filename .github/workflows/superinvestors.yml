name: 大师持仓监控

on:
  schedule:
    # 13F 公布期(2/5/8/11月的10-20号)每天检查
    - cron: '0 23 10-20 2,5,8,11 *'
    # 其他时间每周一检查
    - cron: '0 23 * * 1'

  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 运行监控脚本(发邮件 + 归档到 history/)
        env:
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: python superinvestors_monitor.py

      - name: 构建静态站点 docs/
        run: python build_site.py

      - name: 提交状态/归档/站点
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add superinvestor_state.json history/ docs/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "无内容变化,跳过提交"
          else
            git commit -m "Update state/history/site [skip ci]"
            git push || echo "推送失败(可能无权限或冲突)"
          fi
